<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waitlist - Timeline do Casal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      min-height: 100vh; 
      background: linear-gradient(135deg, #741a36 0%, #1e0f2a 50%, #b83280 100%);
      font-family: -apple-system, sans-serif;
      color: white;
      padding: 20px;
    }
    .container { max-width: 500px; margin: 0 auto; padding-top: 100px; text-align: center; }
    h1 { font-size: clamp(2rem, 6vw, 3rem); margin-bottom: 20px; background: linear-gradient(45deg, #f472b6, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    form { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
    input { padding: 18px; border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; background: rgba(255,255,255,0.1); color: white; font-size: 1rem; }
    input::placeholder { color: rgba(255,255,255,0.6); }
    button { padding: 18px; background: linear-gradient(45deg, #f472b6, #a855f7); color: white; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    #debug { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 0.9rem; text-align: left; max-width: 400px; margin: 20px auto 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 DEBUG MODE 💕</h1>
    <p>Testando EmailJS...</p>
    
    <form id="waitlist-form">
      <input type="email" id="user_email" placeholder="seu@email.com" required>
      <button type="submit">TESTAR ENVIO</button>
    </form>
    
    <div id="debug">
      <strong>Console Debug:</strong><br>
      <span id="log"></span>
    </div>
  </div>

  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <script>
    console.log('🔥 EmailJS DEBUG START');
    
    // Teus IDs
    const PUBLIC_KEY = "gSbeiRffpN_7dXQcF";
    const SERVICE_ID = "service_nvq4syc";
    const TEMPLATE_ID = "template_uevai6w";
    
    console.log('Service ID:', SERVICE_ID);
    console.log('Template ID:', TEMPLATE_ID);
    console.log('Public Key:', PUBLIC_KEY);
    
    emailjs.init(PUBLIC_KEY);
    console.log('EmailJS inicializado');
    
    document.getElementById('waitlist-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('user_email').value;
      const log = document.getElementById('log');
      
      log.innerHTML = '1. Form capturado<br>2. Email: ' + email + '<br>3. Tentando enviar...';
      
      emailjs.send(SERVICE_ID, TEMPLATE_ID, {
        to_email: 'dropsolo123@gmail.com', // ← TROCA AQUI
        user_email: email
      }).then(function(response) {
        console.log('SUCCESS!', response);
        log.innerHTML += '<br>✅ ENVIOU! Status: ' + response.status;
        alert('✅ FUNCIONOU!');
      }, function(error) {
        console.error('ERRO COMPLETO:', error);
        log.innerHTML += '<br>❌ ERRO: ' + error.text;
        alert('ERRO: ' + error.text);
      });
    });
    
    // Teste inicial
    console.log('Teste pronto. Abra F12 > Console pra ver logs');
  </script>
</body>
</html>
