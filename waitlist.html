<!DOCTYPE html>
<html>
<head>
  <title>Waitlist - Timeline do Casal</title>
  <meta name="viewport" content="width=device-width">
  <!-- Teu CSS rosa aqui -->
</head>
<body>
  <div style="padding:80px 20px;max-width:500px;margin:0 auto;text-align:center;color:white;">
    <h1 style="font-size:2.5rem;margin-bottom:20px">Junte-se à waitlist 💕</h1>
    <p style="font-size:1.25rem;margin-bottom:40px">Primeiros 100 casais: acesso grátis!</p>
    
    <form id="waitlist-form">
      <input type="email" id="user_email" placeholder="seu@email.com" required 
             style="width:100%;padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:white;font-size:1rem;margin-bottom:15px">
      <button type="submit" style="width:100%;padding:16px;background:linear-gradient(45deg,#f472b6,#a855f7);color:white;border:none;border-radius:12px;font-size:1.1rem;font-weight:bold;cursor:pointer;box-shadow:0 10px 30px rgba(244,114,182,0.4)">
        ✨ Entrar na lista
      </button>
    </form>
    
    <p style="margin-top:30px;font-size:0.9rem;opacity:0.7">Receberá email quando lançarmos!</p>
  </div>

  <!-- EmailJS -->
  <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <script type="text/javascript">
    (function() {
      emailjs.init("gSbeiRffpN_7dXQcF");
    })();
    
    document.getElementById('waitlist-form').addEventListener('submit', function(event) {
      event.preventDefault();
      
      const email = document.getElementById('user_email').value;
      
      emailjs.send('service_nvq4syc', 'service_nvq4syc', {
        to_email: 'dropsolo123@gmail.com',  // ← TEU EMAIL AQUI
        user_email: email
      }).then(function() {
        alert('✅ Email enviado! Você tá na lista! 💕');
        document.getElementById('waitlist-form').reset();
      }, function(error) {
        alert('❌ Erro! Tenta de novo.');
      });
    });
  </script>
</body>
</html>
