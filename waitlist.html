<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waitlist DEBUG - Timeline do Casal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      min-height: 100vh; 
      background: linear-gradient(135deg, #741a36 0%, #1e0f2a 50%, #b83280 100%);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      padding: 20px;
    }
    .container { max-width: 500px; margin: 0 auto; padding-top: 50px; text-align: center; }
    h1 { font-size: 2rem; margin-bottom: 20px; color: #f472b6; }
    form { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto 30px; }
    input { padding: 18px; border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; background: rgba(255,255,255,0.1); color: white; font-size: 1rem; }
    input::placeholder { color: rgba(255,255,255,0.6); }
    button { padding: 18px; background: linear-gradient(45deg, #f472b6, #a855f7); color: white; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .status { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; margin: 20px auto; max-width: 400px; text-align: left; font-size: 0.9rem; }
    .success { background: rgba(0,255,0,0.2); padding: 20px; border-radius: 12px; margin: 20px auto; max-width: 400px; display: none; }
    .error { background: rgba(255,0,0,0.2); padding: 20px; border-radius: 12px; margin: 20px auto; max-width: 400px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 DEBUG Waitlist 💕</h1>
    <p>Teste: bota email → clica → vê status</p>
    
    <form id="waitlist-form">
      <input type="email" id="user_email" placeholder="test@email.com" required>
      <button type="submit">TESTAR</button>
    </form>
    
    <div id="status" class="status">
      <strong>Status:</strong><br>
      1. Aguardando clique...
    </div>
    <div id="success" class="success">✅ FUNCIONOU! Veja Supabase!</div>
    <div id="error" class="error"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    console.log('🔥 DEBUG START');

    const SUPABASE_URL = "https://atuiqulmmeipmzpqyxle.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0dWlxdWxtbWVpcG16cHF5eGxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDA5MjgsImV4cCI6MjA4OTc3NjkyOH0.xffhAd00OTG5QwdAYDIDb4h70gK1KVgeZ3F1e8Mq7bc";

    const statusEl = document.getElementById('status');
    const successEl = document.getElementById('success');
    const errorEl = document.getElementById('error');

    statusEl.innerHTML += '<br>2. Carregando Supabase...';

    // ✅ FIX: usar supabasejs.createClient em vez de redeclarar supabase
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    console.log('Supabase loaded:', db);
    statusEl.innerHTML += '<br>✅ Supabase OK!';

    document.getElementById('waitlist-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email = document.getElementById('user_email').value;
      statusEl.innerHTML += `<br>3. Email: ${email}`;
      console.log('Email:', email);

      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      try {
        statusEl.innerHTML += '<br>4. Tentando salvar...';

        const { data, error } = await db
          .from('waitlist')
          .insert([{ email: email }]);

        if (error) throw error;

        console.log('✅ SALVOU!', data);
        statusEl.innerHTML += '<br>✅ SALVOU NO SUPABASE!';
        successEl.style.display = 'block';
        errorEl.style.display = 'none';

      } catch (err) {
        console.error('❌ ERRO:', err);
        statusEl.innerHTML += `<br>❌ ERRO: ${err.message}`;
        errorEl.innerHTML = `ERRO: ${err.message}`;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'TESTAR';
      }
    });
  </script>
</body>
</html>
